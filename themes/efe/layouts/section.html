{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
  <div onclick="location.href='{{ .RelPermalink }}';" class="container">
    <img class="thumbnail" src="{{ .Params.thumbnail_image }}" alt="{{ .Params.thumbnail_image_alt }}">
    <section>
      <h2 class="postname">{{ .LinkTitle }}</h2>
        {{ $dateMachine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
        {{ $dateHuman := .Date | time.Format "02.01.2006" }}
      <time datetime="{{ $dateMachine }}">{{ $dateHuman }}</time>
      <p class="description">{{ .Page.Description | truncate 300 }}</p>
    </section>
  </div>
  {{ end }}
{{ end }}
